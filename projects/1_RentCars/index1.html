<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Rental Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="main1.css">

</head>
<body>

  <div class="cards-grid">

    <!-- Card 1 -->
    <div class="card">
      <div class="card-image">
        <img src="./img/cars/Lexus.png" alt="Lexus CT200H"/>
      </div>
      <div class="card-body">
        <p class="car-name">Lexus CT200H</p>
        <div class="card-meta">
          <div class="price">
            <span class="price-currency">$</span>
            <span class="price-amount">120</span>
            <span class="price-period">/Day</span>
          </div>
          <div class="location">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
            </svg>
            Djakarta
          </div>
        </div>
        <a href="#" class="btn-rent">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/>
          </svg>
          Rent Now
        </a>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <div class="card-image">
        <img src="./img/cars/Jaguar.png" alt="Jaguar F-Pace"/>
      </div>
      <div class="card-body">
        <p class="car-name">Jaguar F-Pace</p>
        <div class="card-meta">
          <div class="price">
            <span class="price-currency">$</span>
            <span class="price-amount">132</span>
            <span class="price-period">/Day</span>
          </div>
          <div class="location">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
            </svg>
            Bali
          </div>
        </div>
        <a href="#" class="btn-rent">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/>
          </svg>
          Rent Now
        </a>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <div class="card-image">
        <img src="./img/cars/Mercedes.png" alt="Mercedes Benz"/>
      </div>
      <div class="card-body">
        <p class="car-name">Mercedes Benz</p>
        <div class="card-meta">
          <div class="price">
            <span class="price-currency">$</span>
            <span class="price-amount">132</span>
            <span class="price-period">/Day</span>
          </div>
          <div class="location">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
            </svg>
            Bandung
          </div>
        </div>
        <a href="#" class="btn-rent">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/>
          </svg>
          Rent Now
        </a>
      </div>
    </div>

  </div>

  <div class="see-all-wrap">
    <a href="#" class="btn-see-all">See All</a>
  </div>
  

</body>
</html>
